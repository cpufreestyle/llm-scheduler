name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Build binaries
        run: |
          mkdir -p dist
          
          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/llm-scheduler-windows-amd64.exe ./cmd
          
          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/llm-scheduler-linux-amd64 ./cmd
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/llm-scheduler-linux-arm64 ./cmd
          
          # macOS
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/llm-scheduler-darwin-amd64 ./cmd
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/llm-scheduler-darwin-arm64 ./cmd
          
          ls -lh dist/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true